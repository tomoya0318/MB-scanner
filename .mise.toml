# =============================================================================
# ツールバージョン管理
# =============================================================================
# このファイルがチーム全体・ローカル・Docker の唯一の真実の源泉
# バージョンはピン留めし、再現性を担保する

[tools]
uv = "0.10.6"
node = "22"
pnpm = "10"

# =============================================================================
# 開発環境のセットアップ
# =============================================================================

[tasks.venv]
description = "Python の仮想環境を作成する"
run = """
echo "Creating Python virtual environment..."
uv venv --clear
"""

[tasks.python-deps]
description = "Python の依存関係をインストールする"
depends = ["venv"]
run = """
echo "Installing Python dependencies..."
uv sync --dev
"""

[tasks.setup]
description = "submodule + Python + mb-analyzer の依存とビルド (dist/cli.js) をまとめて用意する (clone / worktree 直後用)"
depends = ["python-deps", "build-analyzer"]
run = """
echo "Updating git submodules (remote tip を追従)..."
git submodule update --init --recursive --remote
"""

[tasks.setup-dataset]
description = "Selakovic dataset の vendor deps (node_modules) を再生成。重いので equiv/preprocess 全件再走の前に 1 回 (初回 or dataset bump 後)。"
depends = ["setup"]
run = "bash data/selakovic-2016-issues/scripts/install-vendor-deps.sh"

# =============================================================================
# コードの品質管理
# =============================================================================

[tasks.format]
description = "プロジェクトをフォーマットする"
run = """
echo "Formatting code with Ruff..."
uvx ruff format .
"""

[tasks.lint]
description = "プロジェクトの静的解析(Lint)を実行する"
run = """
echo "Linting code with Ruff..."
uvx ruff check .
"""

[tasks.fix]
description = "フォーマットと自動修正をまとめて実行する"
depends = ["format"]
run = "uvx ruff check . --fix"

[tasks.typecheck]
description = "型チェックを実行する"
run = """
echo "Running type check with Pyright..."
uv run pyright
"""

[tasks.typecheck-analyzer]
description = "mb-analyzer (新 TypeScript 実装) の型チェックを実行する"
run = """
echo "Running TypeScript type check on mb-analyzer..."
pnpm --prefix mb-analyzer run typecheck
"""

[tasks.lint-analyzer]
description = "mb-analyzer の ESLint (依存方向検査込み) を実行する"
run = """
echo "Running ESLint on mb-analyzer..."
pnpm --prefix mb-analyzer run lint
"""

# =============================================================================
# テスト
# =============================================================================

[tasks.test]
description = "テストを実行する"
run = "uv run pytest mb_scanner/tests/"

[tasks.test-cov]
description = "カバレッジ付きでテストを実行する"
run = "uv run pytest mb_scanner/tests/ --cov=mb_scanner --cov-report=term-missing"

[tasks.test-analyzer]
description = "mb-analyzer (新 TypeScript 実装) の vitest を実行する"
run = """
echo "Running vitest on mb-analyzer..."
pnpm --prefix mb-analyzer run test
"""

[tasks.test-analyzer-cov]
description = "mb-analyzer (新 TypeScript 実装) の vitest をカバレッジ付きで実行する"
run = """
echo "Running vitest with coverage on mb-analyzer..."
pnpm --prefix mb-analyzer run test:cov
"""

# =============================================================================
# アーキテクチャ検証
# =============================================================================

[tasks.check-arch]
description = "import-linter でレイヤー契約を検証する (config は mb_scanner/pyproject.toml の [tool.importlinter])"
run = "cd mb_scanner && uv run --project .. lint-imports"

[tasks.check]
description = "Lint + 型チェック + テスト + アーキテクチャ検証を一括実行する"
depends = [
    "lint",
    "typecheck",
    "typecheck-analyzer",
    "lint-analyzer",
    "test",
    "test-analyzer",
    "check-arch",
]
run = ""

# =============================================================================
# TypeScript ビルド
# =============================================================================

[tasks.build-analyzer]
description = "mb-analyzer (新 TypeScript 実装) を dist/cli.js にバンドルする"
run = """
echo "Building mb-analyzer..."
pnpm --prefix mb-analyzer install --prefer-offline
pnpm --prefix mb-analyzer run build
"""

[tasks.stop-analyzer-watch]
description = "mb-analyzer の TypeScript watch を停止する"
run = """
echo "Stopping TypeScript watch processes..."
pkill -f 'node build.mjs --watch' || true
pkill -f 'esbuild .*src/index.ts.*--watch' || true
"""

# =============================================================================
# Docker — 日常開発用（dev コンテナ）
# =============================================================================

[tasks."docker:build"]
description = "dev イメージをビルドする"
run = "docker compose build dev"

[tasks."docker:up"]
description = "dev コンテナを起動する（バックグラウンド）"
run = "docker compose up -d dev"

[tasks."docker:shell"]
description = "dev コンテナにシェルで入る"
run = "docker compose exec dev bash"

[tasks."docker:down"]
description = "dev コンテナを停止する"
run = "docker compose down"

[tasks."docker:logs"]
description = "dev コンテナのログを表示する"
run = "docker compose logs -f dev"

[tasks."docker:restart"]
description = "dev コンテナを再起動する"
run = """
docker compose down
docker compose up -d dev
"""

# =============================================================================
# Docker — 再現実験用（archive プロファイル = prod イメージ）
# =============================================================================

[tasks."docker:archive:build"]
description = "再現実験用 (prod) イメージをビルドする"
run = "docker compose --profile archive build scanner"

[tasks."docker:archive:run"]
description = "再現実験用 (prod) イメージで単発コマンドを実行する（引数は docker compose run に追加される）"
run = "docker compose --profile archive run --rm scanner"

# =============================================================================
# サーバ同期 (rsync)
# =============================================================================

[tasks."sync:brain2"]
description = "brain-2 サーバへ rsync で同期する"
run = """
echo "📤 Syncing files to brain-2..."
rsync -av --exclude-from=exclude-list.txt . brain-2:/mnt/data1/tomoya-n/MB-Scanner
echo "✅ Sync to brain-2 completed!"
"""

[tasks."sync:dry-run"]
description = "brain-2 への同期内容を dry-run で確認する"
run = """
echo "🔍 Dry-run: previewing sync to brain-2..."
rsync -av --dry-run --exclude-from=exclude-list.txt . brain-2:/mnt/data1/tomoya-n/MB-Scanner
"""
